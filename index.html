<!doctype html>
<html lang="en">
  <head>
    <title>Parker & Co.</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS v5.2.0-beta1 -->
   <link rel="stylesheet" href="sass/styles/style.css">

  </head>
  <body>
    <header>
        <!-- Moving Banner -->
        <div class="carousel slide" id="myCarousel" data-ride="carousel">
            <div class="carouselInner" role="listbox">
                <div class="item active">Welcome to Parker & Co.</div>
                <div class="item">SALE 50% OFF ON SELECT ITEMS.</div>
                <div class="item">Free shipping across Canada.</div>
            </div>
            <!-- Banner circle -->
            <ol class="carouselIndicators">
                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide-to="1"></li>
                <li data-target="#myCarousel" data-slide-to="2"></li>
            </ol>
    
        </div>
        <div class="wrapper">
            <h1>Parker & Co.</h1>
            <div class="header">
                <nav>
                    <div class="menu" id="menu_icon">
                        <span><i class="gg-menu"></i></span>
                    </div>
                    <ul class="mobile_menu">
                        <li><a href="" class="option">Collars, Harness & Leashes</a></li>
                        <li><a href="" class="option">Apparel</a></li>
                        <li><a href="" class="option">Toys</a></li>
                        <li><a href="" class="option">Carriers</a></li>
                    </ul>
                </nav>
                <ul class="desktop_menu">
                    <li><a href="">Collars, Harness & Leashes</a></li>
                    <li><a href="">Apparel</a></li>
                    <li><a href="">Toys</a></li>
                    <li><a href="">Carriers</a></li>
                </ul>
                <div class="shopping_cart">
                    <span><i class="gg-shopping-cart"></i></span>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section>
            <div class="main_img_con">
                <img class="main_img" src="./assets/00100lrPORTRAIT_00100_BURST20191225112156991_COVER.jpg"
                    alt="Poodle sleeping with bow on top.">
            </div>
        </section>
        <section>
            <!-- category section -->
            <div class="wrapper">
                <h2>Shop by category</h2>
                <div class="category_con">
                    <div class="collars">
                        <img src="./assets/camylla-battani-zSCoQkrLMOE-unsplash.jpg"
                            alt="Dog wearing white leaather collar.">
                        <p><a href="collar">Collars, Harness & Leashes</a></p>
                    </div>
                    <div class="apparel">
                        <img src="./assets/charlesdeluvio-AQRp2NH-O8k-unsplash.jpg"
                            alt="Dog wearing a yellow beanie and grey sweater.">
                        <p><a href="apparel">Apparel</a></p>
                    </div>
                    <div class="toys">
                        <img src="./assets/jesper-brouwers-oD8uurkrH4c-unsplash.jpg"
                            alt="Dog holding moose stuffed animal toy.">
                        <p><a href="toys">Toys</a></p>
                    </div>
                    <div class="carriers">
                        <img src="./assets/flouffy-5n4xYIZvesQ-unsplash.jpg" alt="Dog sitting in grey car carrier.">
                        <p><a href="carriers">Carriers</a></p>
                    </div>
                </div>
            </div>
        </section>
        <footer>
            <div class="footer_icons">
                <ul>
                    <!-- <li><a href="#home"></a><i class="gg-home"></i></li>
                        <li><a href="#collections"></a><i class="gg-menu-grid-o"></i></li>
                        <li><a href="#shopping"><i class="gg-shopping-cart"></i></a> </li> -->
                </ul>
            </div>
        </footer>
    </main>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js" integrity="sha384-Xe+8cL9oJa6tN/veChSP7q+mnSPaj5Bcu9mPX5F5xIGE0DVittaqT5lorf0EI7Vk" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-kjU+l4N0Yf4ZOJErLsIcvOU2qSb74wXpOhqTvwVx3OElZRweTnQ6d31fXEoRD1Jy" crossorigin="anonymous"></script>
  </body>
</html>
